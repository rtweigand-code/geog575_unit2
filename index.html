<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Big Ten Athletic Revenue Map</title>

    <link rel="stylesheet" href="lib/leaflet/leaflet.css" />
